<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <rect width="900" height="400" rx="12" fill="#fdf6ec"/>

  <!-- Edges -->
  <g stroke="#d4c4a8" stroke-width="1" opacity="0.5">
    <!-- Hub 1 connections -->
    <line x1="380" y1="185" x2="260" y2="120"/>
    <line x1="380" y1="185" x2="490" y2="105"/>
    <line x1="380" y1="185" x2="300" y2="270"/>
    <line x1="380" y1="185" x2="470" y2="260"/>
    <line x1="380" y1="185" x2="240" y2="210"/>
    <line x1="380" y1="185" x2="520" y2="185"/>
    <line x1="380" y1="185" x2="340" y2="90"/>
    <line x1="380" y1="185" x2="430" y2="310"/>

    <!-- Hub 2 connections -->
    <line x1="620" y1="210" x2="520" y2="185"/>
    <line x1="620" y1="210" x2="710" y2="140"/>
    <line x1="620" y1="210" x2="730" y2="270"/>
    <line x1="620" y1="210" x2="580" y2="310"/>
    <line x1="620" y1="210" x2="690" y2="330"/>
    <line x1="620" y1="210" x2="550" y2="120"/>

    <!-- Hub 3 connections -->
    <line x1="180" y1="280" x2="300" y2="270"/>
    <line x1="180" y1="280" x2="120" y2="200"/>
    <line x1="180" y1="280" x2="100" y2="330"/>
    <line x1="180" y1="280" x2="240" y2="350"/>
    <line x1="180" y1="280" x2="240" y2="210"/>

    <!-- Cross-cluster links -->
    <line x1="490" y1="105" x2="550" y2="120"/>
    <line x1="470" y1="260" x2="580" y2="310"/>
    <line x1="300" y1="270" x2="240" y2="350"/>
    <line x1="710" y1="140" x2="780" y2="90"/>
    <line x1="730" y1="270" x2="800" y2="310"/>

    <!-- Scattered connections -->
    <line x1="120" y1="200" x2="80" y2="130"/>
    <line x1="260" y1="120" x2="170" y2="80"/>
    <line x1="340" y1="90" x2="280" y2="50"/>
    <line x1="490" y1="105" x2="460" y2="50"/>
    <line x1="430" y1="310" x2="380" y2="360"/>
    <line x1="690" y1="330" x2="750" y2="370"/>
    <line x1="800" y1="310" x2="840" y2="350"/>
    <line x1="780" y1="90" x2="830" y2="60"/>
  </g>

  <!-- Accent edges (stronger connections) -->
  <g stroke="#c4956a" stroke-width="1.5" opacity="0.4">
    <line x1="380" y1="185" x2="620" y2="210"/>
    <line x1="380" y1="185" x2="180" y2="280"/>
    <line x1="620" y1="210" x2="520" y2="185"/>
  </g>

  <!-- Leaf nodes (small) -->
  <g fill="#d4b896">
    <circle cx="80" cy="130" r="3"/>
    <circle cx="170" cy="80" r="3"/>
    <circle cx="280" cy="50" r="3.5"/>
    <circle cx="460" cy="50" r="3"/>
    <circle cx="380" cy="360" r="3"/>
    <circle cx="240" cy="350" r="4"/>
    <circle cx="750" cy="370" r="3"/>
    <circle cx="840" cy="350" r="3"/>
    <circle cx="830" cy="60" r="3"/>
    <circle cx="100" cy="330" r="3.5"/>
  </g>

  <!-- Medium nodes -->
  <g fill="#c4956a">
    <circle cx="260" cy="120" r="5"/>
    <circle cx="340" cy="90" r="5.5"/>
    <circle cx="490" cy="105" r="6"/>
    <circle cx="300" cy="270" r="5.5"/>
    <circle cx="470" cy="260" r="5"/>
    <circle cx="240" cy="210" r="4.5"/>
    <circle cx="430" cy="310" r="5"/>
    <circle cx="710" cy="140" r="6"/>
    <circle cx="730" cy="270" r="5.5"/>
    <circle cx="580" cy="310" r="5"/>
    <circle cx="550" cy="120" r="5.5"/>
    <circle cx="690" cy="330" r="4.5"/>
    <circle cx="120" cy="200" r="5"/>
    <circle cx="780" cy="90" r="4.5"/>
    <circle cx="800" cy="310" r="4"/>
  </g>

  <!-- Connector node -->
  <circle cx="520" cy="185" r="7" fill="#a07050"/>

  <!-- Hub nodes (large) -->
  <circle cx="380" cy="185" r="14" fill="#8b5e3c"/>
  <circle cx="620" cy="210" r="12" fill="#8b5e3c"/>
  <circle cx="180" cy="280" r="10" fill="#8b5e3c"/>

  <!-- Hub glow -->
  <circle cx="380" cy="185" r="22" fill="#8b5e3c" opacity="0.08"/>
  <circle cx="620" cy="210" r="18" fill="#8b5e3c" opacity="0.08"/>
  <circle cx="180" cy="280" r="16" fill="#8b5e3c" opacity="0.08"/>
</svg>
